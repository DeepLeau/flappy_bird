name: Agent Dev

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Tâche à effectuer'
        required: true
      openrouter_api_key:
        description: 'Clé API OpenRouter'
        required: true

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          npm install playwright @playwright/test
          npx playwright install chromium --with-deps

      - name: Install project dependencies
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm install
          elif [ -f "package.json" ]; then
            npm install
          fi
          if [ -f "backend/requirements.txt" ]; then
            cd backend && pip install -r requirements.txt
          fi

      - name: Start servers
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm run dev &
            cd ..
          fi
          if [ -f "backend/requirements.txt" ]; then
            cd backend
            if grep -q "fastapi" requirements.txt; then
              uvicorn main:app --host 0.0.0.0 --port 8000 &
            elif grep -q "flask" requirements.txt; then
              python main.py &
            fi
            cd ..
          fi
          sleep 10
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 3
          done

      - name: Download agent script
        run: |
          curl -o agent.js https://raw.githubusercontent.com/DeepLeau/agentdev/main/scripts/agent.js

      - name: Run agent
        env:
          OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ inputs.task }}
          REPO: ${{ github.repository }}
          BRANCH_NAME: agent/task-${{ github.run_id }}
        run: node agent.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: ignore
