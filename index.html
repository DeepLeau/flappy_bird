<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 100%);
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            text-align: center;
            position: relative;
        }
        
        #gameCanvas {
            border: 3px solid #333;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 100%);
            image-rendering: pixelated;
        }
        
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 20;
        }
        
        #gameOver h2 {
            margin-top: 0;
            color: #FFD700;
        }
        
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 10px;
            z-index: 20;
        }
        
        #startScreen h1 {
            margin-top: 0;
            color: #FFD700;
            font-size: 48px;
        }
        
        button {
            background: #FFD700;
            color: #333;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #FFED4E;
        }
        
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="score">0</div>
        <div id="startScreen">
            <h1>Flappy Bird</h1>
            <p>Appuyez sur espace ou cliquez pour voler!</p>
            <button id="startBtn">Commencer</button>
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p>Meilleur score: <span id="bestScore">0</span></p>
            <button id="restartBtn">Recommencer</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
